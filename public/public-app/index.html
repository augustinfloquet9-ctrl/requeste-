<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demande un titre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#f5f3ec; --paper:#ffffff; --paper-line:#e2ded0; --ink:#0a0a0a; --ink-dim:#6b6b75; --accent:#2f6fed; --accent-ink:#ffffff; --eyebrow:#4fa3d8; --torn:#d8d4c4; --overlay:rgba(20,18,10,.5); --hero-bg:#eef4fd; --like:#e0245e; }
  :root[data-theme="dark"]{ --bg:#14151c; --paper:#1c1e28; --paper-line:#2c2f3d; --ink:#ffffff; --ink-dim:#8b8ea0; --accent:#5b8def; --accent-ink:#0c1220; --eyebrow:#3b6ea5; --torn:#3a3d4d; --overlay:rgba(10,10,14,.72); --hero-bg:#1a2536; --like:#ff4b72; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{ background:var(--bg); color:var(--ink); font-family:'Oswald',-apple-system,sans-serif; min-height:100vh; padding-bottom:50px; transition:background .2s ease, color .2s ease; }
  .head{ padding:34px 20px 18px; text-align:center; border-bottom:1px dashed var(--torn); position:relative; }
  .theme-toggle{ position:absolute; top:20px; right:20px; background:var(--paper); border:1px solid var(--paper-line); color:var(--ink); width:36px; height:36px; border-radius:50%; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .eyebrow{ font-family:'Zapfino','Brush Script MT',cursive; font-size:20px; color:var(--eyebrow); font-weight:400; }
  .head h1{ font-family:'Impact',sans-serif; font-size:34px; text-transform:uppercase; margin-top:8px; color:var(--ink); font-weight:400; }
  .wrap{max-width:520px;margin:0 auto;padding:0 20px;}
  .hero{ margin-top:22px; background:var(--hero-bg); border:1px solid var(--accent); border-radius:8px; padding:22px; text-align:center; }
  .hero h2{ font-family:'Impact',sans-serif; font-size:26px; text-transform:uppercase; margin:6px 0 8px; }
  .hero p{ font-size:14px; color:var(--ink-dim); line-height:1.5; margin-bottom:16px; }
  .hero-btn{ background:var(--accent); color:var(--accent-ink); border:none; border-radius:100px; padding:13px 26px; font-family:'Oswald',sans-serif; font-weight:700; font-size:14px; text-transform:uppercase; cursor:pointer; }
  .ticket-form{ margin-top:22px; background:var(--paper); border:1px solid var(--paper-line); border-radius:4px; padding:18px; position:relative; }
  .ticket-form::before{ content:""; position:absolute; left:0; right:0; top:0; height:3px; background:repeating-linear-gradient(90deg, var(--accent) 0 10px, transparent 10px 18px); }
  .field{margin-bottom:12px;}
  .field label{ display:block; font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; color:var(--ink-dim); margin-bottom:6px; }
  .field input{ width:100%; background:var(--bg); border:1px solid var(--paper-line); border-radius:3px; color:var(--ink); font-family:'Oswald',sans-serif; font-size:16px; padding:12px; outline:none; }
  .submit{ width:100%; background:var(--accent); color:var(--accent-ink); border:none; border-radius:3px; padding:13px; font-family:'Oswald',sans-serif; font-weight:700; font-size:14px; text-transform:uppercase; cursor:pointer; margin-top:4px; }
  .section-title{ font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase; color:var(--ink-dim); font-weight:700; margin:28px 0 10px; }
  .ticket{ display:flex; align-items:center; background:var(--paper); border:1px solid var(--paper-line); border-radius:4px; margin-bottom:10px; overflow:hidden; padding:14px; gap:12px; }
  .ticket-body{ flex:1; min-width:0; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .ticket-meta{min-width:0;}
  .ticket-meta .t{ font-size:16px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--ink); }
  .ticket-meta .a{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
  .like-btn{ flex-shrink:0; background:transparent; border:1px solid var(--like); color:var(--like); border-radius:20px; padding:8px 16px; font-family:'Oswald',sans-serif; font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px; transition: all 0.2s ease; }
  .like-btn:disabled { background: var(--bg); border-color: var(--paper-line); color: var(--ink-dim); cursor: default; }
  .like-btn:active:not(:disabled){transform:scale(0.95);}
  .empty{ font-family:'JetBrains Mono',monospace; color:var(--ink-dim); font-size:12px; text-align:center; padding:22px 0; }
  .toast{ position:fixed; bottom:22px;left:50%; transform:translateX(-50%) translateY(100px); background:var(--accent); color:var(--accent-ink); padding:11px 20px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; text-transform:uppercase; transition:transform .3s ease; z-index:50; }
  .toast.show{transform:translateX(-50%) translateY(0);}
  .modal-overlay{ position:fixed; inset:0; background:var(--overlay); display:flex; align-items:flex-end; justify-content:center; z-index:100; }
  .modal-overlay[hidden]{display:none;}
  .modal-panel{ background:var(--paper); border:1px solid var(--paper-line); border-radius:14px 14px 0 0; width:100%; max-width:560px; height:88vh; display:flex; flex-direction:column; overflow:hidden; }
  .modal-header{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--paper-line); }
  .modal-header .t{font-size:15px;font-weight:700;text-transform:uppercase;font-family:'Oswald',sans-serif;}
  .modal-close{ background:transparent; border:1px solid var(--paper-line); color:var(--ink); width:30px;height:30px; border-radius:50%; font-size:14px; cursor:pointer; }
  .modal-body{flex:1;position:relative;background:var(--bg);}
  .modal-body iframe{width:100%;height:100%;border:none;}
</style>
</head>
<body>

<div class="head">
  <button class="theme-toggle" id="theme-toggle">☾</button>
  <div class="eyebrow">Bon de demande</div>
  <h1>Demande un titre</h1>
</div>

<div class="wrap">
  <div class="hero">
    <div class="eyebrow">Coup de pouce</div>
    <h2>Soutiens le DJ</h2>
    <p>Cette soirée n'a pas de prix, mais les prochaines platines si 🎧<br>Chaque petit geste aide.</p>
    <button class="hero-btn" id="cagnotte-fab">Voir la cagnotte</button>
  </div>

  <div class="ticket-form">
    <div class="field">
      <label>Titre du morceau</label>
      <input id="f-title" type="text" placeholder="ex: One More Time">
    </div>
    <div class="field">
      <label>Artiste</label>
      <input id="f-artist" type="text" placeholder="ex: Daft Punk">
    </div>
    <button class="submit" id="submit-btn">Envoyer au DJ</button>
  </div>

  <div class="section-title">Les morceaux les plus demandés 🔥</div>
  <div id="vote-list"></div>
</div>

<div class="modal-overlay" id="cagnotte-modal" hidden>
  <div class="modal-panel">
    <div class="modal-header">
      <div class="t">Cagnotte — ma prochaine platine</div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <iframe id="cagnotte-iframe" src="" title="Cagnotte"></iframe>
    </div>
  </div>
</div>

<div class="toast" id="toast">Demande envoyée</div>

<script>
const $ = (id) => document.getElementById(id);
const CAGNOTTE_URL = 'https://www.lepotcommun.fr/cagnotte/festive/ma-prochaine-platine-kc35w9qk?_se=YXVndXN0aW4uZmxvcXVldEBpY2xvdWQuY29t';

function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('floor_theme', t);
  $('theme-toggle').textContent = t === 'dark' ? '☀' : '☾';
}
applyTheme(localStorage.getItem('floor_theme') || 'light');
$('theme-toggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

$('cagnotte-fab').addEventListener('click', () => { $('cagnotte-iframe').src = CAGNOTTE_URL; $('cagnotte-modal').hidden = false; });
$('modal-close').addEventListener('click', () => { $('cagnotte-modal').hidden = true; $('cagnotte-iframe').src = ''; });

const VOTED_KEY = 'floor_request_voted_ids';
function getVoted(){ try { return JSON.parse(localStorage.getItem(VOTED_KEY) || '[]'); } catch(e){ return []; } }
function addVoted(id){ const v = getVoted(); v.push(id); localStorage.setItem(VOTED_KEY, JSON.stringify(v)); }
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function showToast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Utilisation de chemins relatifs purs, garanti de fonctionner sur Render
$('submit-btn').addEventListener('click', async () => {
  const title = $('f-title').value.trim();
  const artist = $('f-artist').value.trim();
  if(!title) return;
  
  await fetch('/api/request', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, artist }),
  });
  
  $('f-title').value = ''; $('f-artist').value = '';
  showToast('Demande envoyée');
  loadVoteList();
});

async function loadVoteList(){
  try {
    const res = await fetch('/api/requests');
    const data = await res.json();
    const voted = getVoted();
    const box = $('vote-list');

    if(!data.requests || data.requests.length === 0){
      box.innerHTML = '<div class="empty">Aucune demande pour l\'instant — sois le premier</div>';
      return;
    }

    box.innerHTML = data.requests.map((r) => {
      const already = voted.includes(r.id);
      const countStr = String(r.votes).padStart(2, '0');
      return `
        <div class="ticket">
          <div class="ticket-body">
            <div class="ticket-meta">
              <div class="t">${escapeHtml(r.title)}</div>
              <div class="a">${r.artist ? escapeHtml(r.artist) : 'artiste non précisé'}</div>
            </div>
            <button class="like-btn" data-id="${r.id}" ${already ? 'disabled' : ''}>
              ❤️ ${already ? 'Liké' : 'Like'} (${countStr})
            </button>
          </div>
        </div>
      `;
    }).join('');

    box.querySelectorAll('.like-btn:not(:disabled)').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        btn.disabled = true;
        await fetch(`/api/vote/${id}`, { method: 'POST' });
        addVoted(id);
        loadVoteList();
      });
    });
  } catch(err) {
    console.error("Erreur de récupération :", err);
  }
}

loadVoteList();
setInterval(loadVoteList, 3000);
</script>
</body>
</html>
