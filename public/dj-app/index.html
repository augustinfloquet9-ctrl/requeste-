<script>
const $ = (id) => document.getElementById(id);
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// Gestion du Thème
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('floor_theme', t);
  $('theme-toggle').textContent = t === 'dark' ? '☀' : '☾';
}
applyTheme(localStorage.getItem('floor_theme') || 'dark');
$('theme-toggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

// FONCTION DE MISE À JOUR AVEC DÉTECTEUR DE PANNES INTÉGRÉ
async function updateDashboard() {
  try {
    const res = await fetch('/api/requests');
    
    // Si le serveur répond mais renvoie une erreur (ex: 404 ou 500)
    if (!res.ok) {
      $('main-list').innerHTML = `
        <div class="empty" style="color:var(--danger); font-weight:bold;">
          ❌ ERREUR SERVEUR : ${res.status} ${res.statusText}<br>
          <span style="font-size:12px; color:var(--text)">Le serveur Render existe mais la route /api/requests est introuvable.</span>
        </div>`;
      return;
    }

    const data = await res.json();
    const listContainer = $('main-list');
    const items = data.requests || [];

    if (items.length === 0) {
      listContainer.innerHTML = '<div class="empty">Aucun morceau demandé pour le moment.</div>';
      return;
    }

    listContainer.innerHTML = items.map((track, index) => {
      const isTop = index === 0;
      return `
        <div class="track-card ${isTop ? 'top-track' : ''}">
          <div class="votes">${String(track.votes).padStart(2, '0')}</div>
          <div class="meta">
            <div class="title">${escapeHtml(track.title)}</div>
            <div class="artist">${track.artist ? escapeHtml(track.artist) : 'Artiste non spécifié'}</div>
          </div>
          <button class="btn-done" data-id="${track.id}" title="Marquer comme joué">✓</button>
        </div>
      `;
    }).join('');

    // Actions des boutons "Joué"
    listContainer.querySelectorAll('.btn-done').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        try {
          await fetch(`/api/dj/done/${id}`, { method: 'POST' });
          updateDashboard();
        } catch(e) {
          alert("Impossible de valider ce morceau : " + e.message);
        }
      });
    });

  } catch (err) {
    // Si la requête ne part pas du tout (Erreur de réseau / fichier local file://)
    $('main-list').innerHTML = `
      <div class="empty" style="color:var(--danger); font-weight:bold; line-height:1.6;">
        ⚠️ ERREUR DE CONNEXION <br>
        <span style="font-size:13px; color:var(--text); font-style:normal; display:block; margin-top:8px;">
          L'application n'arrive pas à contacter l'API.<br>
          Vérifie bien que tu es sur ton lien internet Render (https://...) et <strong>non en local</strong> (file:///).
        </span>
        <small style="color:var(--text-dim); display:block; margin-top:4px; font-family:monospace;">Detail : ${err.message}</small>
      </div>`;
  }
}

// Action Tout effacer
$('clear-btn').addEventListener('click', async () => {
  if (confirm('Voulez-vous réinitialiser toute la liste de demandes ?')) {
    try {
      await fetch('/api/dj/clear', { method: 'POST' });
      updateDashboard();
    } catch(e) {
      alert("Erreur lors du nettoyage : " + e.message);
    }
  }
});

// Démarrage et boucle de rafraîchissement (toutes les 2 secondes)
updateDashboard();
setInterval(updateDashboard, 2000);
</script>
