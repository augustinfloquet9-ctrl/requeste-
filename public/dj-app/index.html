<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Régie DJ — Gestion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght=500;700&family=JetBrains+Mono:wght=500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f5f3ec;
    --paper:#ffffff;
    --paper-line:#e2ded0;
    --ink:#0a0a0a;
    --ink-dim:#6b6b75;
    --accent:#2f6fed;
    --eyebrow:#2f6fed;
    --torn:#d8d4c4;
    --danger:#d93838;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{ background:var(--bg); color:var(--ink); font-family:'Oswald',sans-serif; padding-bottom:60px; }
  .mono{font-family:'JetBrains Mono',monospace;}
  .wrap{max-width:750px; margin:0 auto; padding:0 20px;}
  
  .head{ padding:30px 0 15px; border-bottom:1px dashed var(--torn); display:flex; justify-content:space-between; align-items:center;}
  .head h1{ font-family:'Impact',sans-serif; font-size:36px; text-transform:uppercase; }
  
  .eyebrow{ font-family:'Zapfino','Brush Script MT',cursive; font-size:22px; color:var(--eyebrow); }
  .section-title{ font-family:'Impact',sans-serif; font-size:26px; text-transform:uppercase; margin:30px 0 12px; }

  .btn{ background:var(--paper); border:1px solid var(--paper-line); color:var(--ink); padding:8px 14px; font-family:'Oswald',sans-serif; font-weight:700; text-transform:uppercase; cursor:pointer; border-radius:3px; }
  .btn-danger{ border-color:var(--danger); color:var(--danger); }
  .btn-danger:hover{ background:var(--danger); color:#fff; }

  .ticket{ display:flex; align-items:stretch; background:var(--paper); border:1px solid var(--paper-line); border-radius:4px; margin-bottom:10px; overflow:hidden; }
  .ticket-num{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:22px; color:var(--accent); background:var(--bg); width:60px; display:flex; align-items:center; justify-content:center; border-right:1px dashed var(--torn); }
  .ticket-body{ flex:1; padding:12px 14px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .ticket-meta{ min-width:0; flex:1; }
  .ticket-meta .t{ font-size:18px; font-weight:700; }
  .ticket-meta .a{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-dim); text-transform:uppercase; }

  .btn-done { background: #238636; color: #fff; border: none; width: 44px; height: 44px; font-size: 18px; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor:pointer; }
  .btn-done:hover { background: #2ea043; }

  .msg-time{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-dim); margin-left:auto; }

  .cal-inputs{ display:flex; gap:10px; background:var(--paper); padding:15px; border:1px solid var(--paper-line); border-radius:4px; }
  .cal-inputs input{ flex:1; background:var(--bg); border:1px solid var(--paper-line); padding:10px; font-family:'Oswald',sans-serif; font-size:15px; color:var(--ink); outline:none; border-radius:3px; }
  .btn-add{ background:var(--accent); color:#fff; border:none; padding:0 20px; font-family:'Oswald',sans-serif; font-weight:700; text-transform:uppercase; cursor:pointer; border-radius:3px; }

  .empty{ font-family:'JetBrains Mono',monospace; color:var(--ink-dim); font-size:12px; text-align:center; padding:20px 0; }
</style>
</head>
<body>

<div class="wrap">
  <div class="head">
    <div>
      <div class="eyebrow">Tableau de bord</div>
      <h1>Régie DJ</h1>
    </div>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-danger" id="clear-msg-btn">Vider Messages</button>
      <button class="btn btn-danger" id="clear-btn">Vider Musiques</button>
    </div>
  </div>

  <div class="section-title">🎵 Playlist des Invités (Classée par votes)</div>
  <div id="main-list"><div class="empty">Chargement...</div></div>

  <div class="section-title">💬 Messages direct au DJ</div>
  <div id="msg-list"><div class="empty">Aucun message...</div></div>

  <div class="section-title">📅 Ajouter une date à l'agenda</div>
  <div class="cal-inputs">
    <input type="text" id="cal-date" placeholder="Ex: Samedi 12 Octobre">
    <input type="text" id="cal-loc" placeholder="Ex: Le Privé, Paris">
    <button class="btn-add" id="add-cal-btn">Ajouter</button>
  </div>
  <div id="cal-list" style="margin-top:12px;"></div>

  <div style="text-align: center; padding: 50px 0 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-dim); opacity: 0.6;">
    1.2.1
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

async function updateDashboard() {
  try {
    const resReq = await fetch('/api/requests');
    if (resReq.ok) {
      const data = await resReq.json();
      const items = data.requests || [];
      $('main-list').innerHTML = items.length === 0 ? '<div class="empty">Aucune demande en cours.</div>' : items.map(track => `
        <div class="ticket">
          <div class="ticket-num mono">${String(track.votes).padStart(2, '0')}</div>
          <div class="ticket-body">
            <div class="ticket-meta">
              <div class="t">${escapeHtml(track.title)}</div>
              <div class="a">${track.artist ? escapeHtml(track.artist) : 'Artiste non spécifié'}</div>
            </div>
            <button class="btn-done" data-id="${track.id}">✓</button>
          </div>
        </div>
      `).join('');

      $('main-list').querySelectorAll('.btn-done').forEach(btn => {
        btn.addEventListener('click', async () => {
          await fetch(`/api/dj/done/${btn.dataset.id}`, { method: 'POST' });
          updateDashboard();
        });
      });
    }

    const resMsg = await fetch('/api/messages');
    if (resMsg.ok) {
      const data = await resMsg.json();
      const msgs = data.messages || [];
      $('msg-list').innerHTML = msgs.length === 0 ? '<div class="empty">Aucun message reçu.</div>' : msgs.map(m => `
        <div class="ticket">
          <div class="ticket-num mono" style="font-size:14px; width:50px; color:var(--ink-dim);">💬</div>
          <div class="ticket-body">
            <div class="ticket-meta">
              <div class="a" style="color:var(--accent); font-weight:bold; font-size:11px;">${escapeHtml(m.pseudo)}</div>
              <div class="t" style="font-size:16px; font-weight:normal; margin-top:2px;">${escapeHtml(m.text)}</div>
            </div>
            <div class="msg-time">${m.time}</div>
          </div>
        </div>
      `).reverse().join('');
    }

    const resCal = await fetch('/api/dates');
    if (resCal.ok) {
      const data = await resCal.json();
      const dates = data.dates || [];
      $('cal-list').innerHTML = dates.length === 0 ? '<div class="empty">Aucune date programmée.</div>' : dates.map(d => `
        <div class="ticket">
          <div class="ticket-num mono" style="font-size:14px; width:50px;">📅</div>
          <div class="ticket-body">
            <div class="ticket-meta">
              <div class="t">${escapeHtml(d.date)}</div>
              <div class="a" style="color: var(--accent); font-weight:bold;">${escapeHtml(d.location)}</div>
            </div>
          </div>
        </div>
      `).join('');
    }
  } catch (err) {}
}

$('clear-btn').addEventListener('click', async () => {
  if (confirm('Vider la playlist ?')) { await fetch('/api/dj/clear', { method: 'POST' }); updateDashboard(); }
});
$('clear-msg-btn').addEventListener('click', async () => {
  if (confirm('Supprimer les messages ?')) { await fetch('/api/dj/messages/clear', { method: 'POST' }); updateDashboard(); }
});

$('add-cal-btn').addEventListener('click', async () => {
  const date = $('cal-date').value.trim();
  const location = $('cal-loc').value.trim();
  if(!date || !location) return;
  await fetch('/api/dj/dates', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date, location })
  });
  $('cal-date').value = ''; $('cal-loc').value = '';
  updateDashboard();
});

setInterval(updateDashboard, 2500);
updateDashboard();
</script>
</body>
</html>
