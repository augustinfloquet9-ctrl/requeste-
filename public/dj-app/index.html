<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ — Demandes en Temps Réel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0c10;
    --card: #1f2833;
    --text: #ffffff;
    --text-dim: #c5a059;
    --accent: #45f3ff;
    --danger: #ff4b5c;
    --border: #2c3540;
  }
  :root[data-theme="light"] {
    --bg: #f4f6f9;
    --card: #ffffff;
    --text: #1a1a1a;
    --text-dim: #666666;
    --accent: #0070f3;
    --danger: #e0245e;
    --border: #e1e8ed;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
  body { background: var(--bg); color: var(--text); padding: 20px; transition: background 0.2s; }
  .container { max-width: 800px; margin: 0 auto; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 15px; border-bottom: 2px solid var(--border); }
  .header h1 { font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
  .controls { display: flex; gap: 12px; }
  
  button, input { font-weight: 600; border-radius: 6px; outline: none; }
  button { cursor: pointer; transition: all 0.1s ease; }
  
  .btn-clear { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px 16px; font-size: 13px; }
  .btn-clear:hover { background: var(--danger); color: #fff; }
  .btn-theme { background: var(--card); border: 1px solid var(--border); color: var(--text); width: 38px; height: 38px; font-size: 16px; }

  h2 { font-size: 18px; font-weight: 800; text-transform: uppercase; color: var(--accent); margin: 30px 0 15px 0; letter-spacing: 0.5px; }

  .track-list, .message-list, .cal-list { display: flex; flex-direction: column; gap: 12px; }
  
  /* Style des cartes */
  .track-card, .msg-card, .cal-card { 
    display: flex; align-items: center; 
    background: var(--card); border: 1px solid var(--border); 
    padding: 16px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  }
  
  /* Classement : Le premier du classement s'illumine en bleu */
  .track-card.top-track { border-color: var(--accent); background: linear-gradient(145deg, var(--card), rgba(69, 243, 255, 0.03)); }
  .track-card.top-track .votes { color: var(--accent); font-size: 32px; }

  .votes { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; min-width: 60px; text-align: center; margin-right: 16px; color: var(--text-dim); }
  
  .meta { flex: 1; min-width: 0; padding-right: 15px; }
  .title { font-size: 18px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .artist { font-size: 14px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Gros bouton DONE vert */
  .btn-done { background: #238636; color: #fff; border: none; width: 48px; height: 48px; font-size: 20px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
  .btn-done:hover { background: #2ea043; transform: scale(1.05); }
  .btn-done:active { transform: scale(0.95); }

  /* Style Messages */
  .msg-pseudo { font-weight: 800; color: var(--accent); font-size: 14px; text-transform: uppercase; margin-bottom: 2px; }
  .msg-text { font-size: 16px; color: #fff; }
  :root[data-theme="light"] .msg-text { color: #1a1a1a; }
  .msg-time { font-size: 12px; color: var(--text-dim); margin-left: auto; opacity: 0.7; }

  /* Formulaire Calendrier */
  .cal-inputs { display: flex; gap: 10px; margin-bottom: 12px; }
  .cal-inputs input { flex: 1; background: var(--card); border: 1px solid var(--border); color: #fff; padding: 12px; font-size: 14px; }
  :root[data-theme="light"] .cal-inputs input { color: #1a1a1a; }
  .btn-add-cal { background: var(--accent); color: #0b0c10; border: none; padding: 0 20px; font-weight: bold; }

  .empty { text-align: center; padding: 30px 0; color: var(--text-dim); font-size: 15px; font-style: italic; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Demandes Titres</h1>
    <div class="controls">
      <button class="btn-clear" id="clear-msg-btn" style="border-color: var(--text-dim); color: var(--text-dim);">Vider Messages</button>
      <button class="btn-clear" id="clear-btn">Tout effacer</button>
      <button class="btn-theme" id="theme-toggle">☀</button>
    </div>
  </div>

  <h2>🎵 Playlist des Invités (Classée par votes)</h2>
  <div class="track-list" id="main-list">
    <div class="empty">Chargement de la playlist...</div>
  </div>

  <h2>💬 Messages en Direct</h2>
  <div class="message-list" id="msg-list">
    <div class="empty">Aucun message pour le moment.</div>
  </div>

  <h2>📅 Ajouter une date au calendrier</h2>
  <div class="cal-inputs">
    <input type="text" id="cal-date" placeholder="Ex: Samedi 12 Octobre">
    <input type="text" id="cal-loc" placeholder="Ex: Club Le Privé, Paris">
    <button class="btn-add-cal" id="add-cal-btn">Ajouter</button>
  </div>
  <div class="cal-list" id="cal-list">
    <div class="empty">Aucune date planifiée.</div>
  </div>

  <div style="text-align: center; padding: 60px 20px 20px 20px; color: var(--text-dim); font-size: 12px; font-weight: bold; letter-spacing: 1px; opacity: 0.5;">
    1.1.0
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// Gestion du Thème
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('floor_theme', t);
  if ($('theme-toggle')) $('theme-toggle').textContent = t === 'dark' ? '☀' : '☾';
}
applyTheme(localStorage.getItem('floor_theme') || 'dark');
$('theme-toggle').addEventListener('click', () => {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

// Synchronisation et Classement automatique
async function updateDashboard() {
  try {
    // Récupération des musiques (le serveur renvoie la liste déjà triée par votes)
    const resReq = await fetch('/api/requests');
    if (resReq.ok) {
      const data = await resReq.json();
      const items = data.requests || [];
      $('main-list').innerHTML = items.length === 0 ? '<div class="empty">Aucun morceau demandé pour le moment.</div>' : items.map((track, index) => `
        <div class="track-card ${index === 0 ? 'top-track' : ''}">
          <div class="votes">${String(track.votes).padStart(2, '0')}</div>
          <div class="meta">
            <div class="title">${escapeHtml(track.title)}</div>
            <div class="artist">${track.artist ? escapeHtml(track.artist) : 'Artiste non spécifié'}</div>
          </div>
          <button class="btn-done" data-id="${track.id}">✓</button>
        </div>
      `).join('');

      $('main-list').querySelectorAll('.btn-done').forEach(btn => {
        btn.addEventListener('click', async () => {
          await fetch(`/api/dj/done/${btn.dataset.id}`, { method: 'POST' });
          updateDashboard();
        });
      });
    }

    // Récupération des Messages
    const resMsg = await fetch('/api/messages');
    if (resMsg.ok) {
      const data = await resMsg.json();
      const msgs = data.messages || [];
      $('msg-list').innerHTML = msgs.length === 0 ? '<div class="empty">Aucun message reçu.</div>' : msgs.map(m => `
        <div class="msg-card">
          <div class="meta">
            <div class="msg-pseudo">${escapeHtml(m.pseudo)}</div>
            <div class="msg-text">${escapeHtml(m.text)}</div>
          </div>
          <div class="msg-time">${m.time}</div>
        </div>
      `).reverse().join('');
    }

    // Récupération du Calendrier
    const resCal = await fetch('/api/dates');
    if (resCal.ok) {
      const data = await resCal.json();
      const dates = data.dates || [];
      $('cal-list').innerHTML = dates.length === 0 ? '<div class="empty">Aucune date affichée.</div>' : dates.map(d => `
        <div class="cal-card">
          <div class="meta">
            <div class="title">${escapeHtml(d.date)}</div>
            <div class="artist" style="color: var(--accent);">${escapeHtml(d.location)}</div>
          </div>
        </div>
      `).join('');
    }
  } catch (err) { console.error(err); }
}

// Boutons de nettoyage
$('clear-btn').addEventListener('click', async () => {
  if (confirm('Voulez-vous vider la playlist ?')) { await fetch('/api/dj/clear', { method: 'POST' }); updateDashboard(); }
});
$('clear-msg-btn').addEventListener('click', async () => {
  if (confirm('Voulez-vous supprimer tous les messages ?')) { await fetch('/api/dj/messages/clear', { method: 'POST' }); updateDashboard(); }
});

// Ajouter au calendrier
$('add-cal-btn').addEventListener('click', async () => {
  const date = $('cal-date').value.trim();
  const location = $('cal-loc').value.trim();
  if(!date || !location) return;
  await fetch('/api/dj/dates', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date, location })
  });
  $('cal-date').value = ''; $('cal-loc').value = '';
  updateDashboard();
});

updateDashboard();
setInterval(updateDashboard, 2000);
</script>
</body>
</html>
